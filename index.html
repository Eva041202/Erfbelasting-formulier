<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erfbelastingsformulier (schoolproject)</title>
</head>
<body>
    <!-- MARK: bovenaan de pagina-->
    <h2>Aangifte Erfbelasting</h2>

    <!-- MARK: Vragen 1a t/m 2b-->
    <form>
        <p>Persoonsgegevens overledene</p>
        <fieldset>
            <legend>
                1A.
            </legend>
                <label>Voorletter(s)</label>
                <input type="text">

                <label>Tussenvoegsel(s)</label>
                <input type="text">

                <label>Achternaam</label>
                <input type="text">

                <label>BSN-nummer</label>
                <input type="number">

                <label>Overlijdensdatum</label>
                <input type="date">
        </fieldset>

        <fieldset>
            <legend>
                1B.
            </legend>
            Was de overledene getrouwd of had de overledene een geregistreerde partner op het moment van overlijden?
            <label>Ja</label>
            <input type="checkbox">
            <label>Nee <i>(ga verder naar 1C)</i>></label>
            <input type="checkbox">
        </fieldset>

        <fieldset>
            <legend>
                1C.
            </legend>
            Had de overledene kinderen?
            <label>Ja</label>
            <input type="checkbox">
            <label>Nee <i>(ga verder naar 1D)</i></label>
            <input type="checkbox">
        </fieldset>

        <fieldset>
            <legend>
                1D.
            </legend>
            Had de overledene een testament?
            <label>Ja</label>
            <input type="checkbox">
            <label>Nee <i>(ga verder naar 2A)</i></label>
            <input type="checkbox">
        </fieldset>

        <p>Gegevens gemachtigde</p>
        <fieldset>
            <legend>
                2A.
            </legend>
            <label></label>
        </fieldset>
    </form>



</body>
</html>
